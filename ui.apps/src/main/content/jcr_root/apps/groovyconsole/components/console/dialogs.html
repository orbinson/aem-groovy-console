<div id="open-script-modal" class="modal fade" role="dialog" tabindex="-1" aria-labelledby="open-script-modal-title">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
                <h4 class="modal-title" id="open-script-modal-title">Load Script</h4>
            </div>
            <div class="modal-body">
                <div class="list-group" id="open-script-list"></div>
                <p class="text-muted" id="open-script-empty" style="display: none;">No saved scripts found.</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-default" data-dismiss="modal">Cancel</button>
            </div>
        </div>
    </div>
</div>

<div id="save-script-modal" class="modal fade" role="dialog" tabindex="-1" aria-labelledby="save-script-modal-title">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
                <h4 class="modal-title" id="save-script-modal-title">Save Script</h4>
            </div>
            <div class="modal-body">
                <form id="save-script-form">
                    <div class="form-group">
                        <label for="save-script-file-name">File Name</label>
                        <input type="text" class="form-control" id="save-script-file-name" placeholder="File Name"/>
                        <p class="help-block">Warning: will overwrite an existing file with the same name.  The
                            '.groovy' extension will be automatically appended to the file name.</p>
                        <p class="text-danger" id="save-script-error" style="display: none;">File name should only
                            contain characters, numbers or _.-</p>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-default" data-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" id="save-script-confirm">Save</button>
            </div>
        </div>
    </div>
</div>
