name: Build

# Build pushes to the long-lived branches and all pull requests. Restricting push avoids the duplicate run
# that `on: [push, pull_request]` produces for same-repo PR branches (both events fire).
on:
  push:
    branches:
      - main
      - 19.x
  pull_request:

# Cancel an in-progress run when a newer commit is pushed to the same branch/PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 17

      - name: Cache local Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build
        run: mvn --batch-mode --update-snapshots install

      - name: Integration tests
        run: mvn --batch-mode verify -pl it.tests -Pit

      # Save logs only if the job fails
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-logs
          path: it.tests/target/launchers/model/logs/*
